<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Miners 1928 - Design Concepts</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a96e;
            --gold-light: #e0c987;
            --dark: #0a0a0a;
            --dark-mid: #151515;
            --dark-light: #1e1e1e;
            --text: #f5f0e8;
            --text-muted: #888;
            --text-dim: #555;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== GALLERY VIEW ===== */
        .gallery-view {
            height: 100vh;
            overflow-y: auto;
            padding: 60px 20px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .gallery-view.hidden {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none;
            position: absolute;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .gallery-header .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .gallery-header .instructions {
            font-size: 0.78rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .concepts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            max-width: 1300px;
            width: 100%;
        }

        .concept-card {
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            background: var(--dark-mid);
        }

        .concept-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .card-swatch {
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-swatch .card-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            letter-spacing: 0.15em;
            z-index: 1;
        }

        .card-swatch::after {
            content: 'CLICK TO VIEW';
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .concept-card:hover .card-swatch::after { opacity: 1; }

        /* Card color schemes */
        .card-a .card-swatch { background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #0a0a0a); color: #c9a96e; border-bottom: 2px solid #c9a96e; }
        .card-b .card-swatch { background: linear-gradient(135deg, #fafafa, #e8e2d9, #fafafa); color: #2d5a47; border-bottom: 2px solid #2d5a47; }
        .card-c .card-swatch { background: linear-gradient(135deg, #f5f0eb, #e8ddd0, #f5f0eb); color: #6b1d1d; border-bottom: 2px solid #b87333; }
        .card-d .card-swatch { background: linear-gradient(135deg, #0d1b2a, #1b2838, #0d1b2a); color: #d4956a; border-bottom: 2px solid #d4956a; }
        .card-e .card-swatch { background: linear-gradient(135deg, #f8f4ef, #ece5da, #f8f4ef); color: #2c1810; border-bottom: 2px solid #c8973e; }

        .card-info {
            padding: 20px 22px 24px;
        }

        .card-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            margin-bottom: 4px;
        }

        .card-info .tag {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .card-a .tag { color: #c9a96e; }
        .card-b .tag { color: #2d5a47; }
        .card-c .tag { color: #b87333; }
        .card-d .tag { color: #d4956a; }
        .card-e .tag { color: #c8973e; }

        .card-info p {
            font-size: 0.82rem;
            line-height: 1.65;
            color: var(--text-muted);
        }

        /* ===== VIEWER MODE ===== */
        .viewer {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            background: var(--dark);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .viewer.active {
            opacity: 1;
            pointer-events: all;
        }

        /* Top bar */
        .viewer-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 56px;
            background: var(--dark-mid);
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            z-index: 10;
        }

        .viewer-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .viewer-title h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
        }

        .viewer-title .concept-tag {
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            background: rgba(201, 169, 110, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid rgba(201, 169, 110, 0.2);
        }

        .viewer-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .viewer-btn {
            background: none;
            border: 1px solid #333;
            color: var(--text);
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .viewer-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .viewer-btn.close-btn {
            background: rgba(255,255,255,0.05);
            border-color: #444;
        }

        .viewer-btn.close-btn:hover {
            background: rgba(255,80,80,0.1);
            border-color: #f55;
            color: #f88;
        }

        .nav-arrow {
            font-size: 1.1rem;
            line-height: 1;
        }

        .viewer-counter {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            padding: 0 6px;
            min-width: 50px;
            text-align: center;
        }

        /* Iframe container */
        .viewer-frame {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .viewer-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .viewer-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            z-index: 5;
            transition: opacity 0.4s ease;
        }

        .viewer-loading.loaded {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid #333;
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bottom thumbnail strip */
        .viewer-strip {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--dark-mid);
            border-top: 1px solid #2a2a2a;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .strip-thumb {
            width: 80px;
            height: 44px;
            border-radius: 5px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.5rem;
            letter-spacing: 0.1em;
            font-weight: 500;
            flex-shrink: 0;
            position: relative;
        }

        .strip-thumb::after {
            content: attr(data-letter);
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem;
        }

        .strip-thumb:hover { border-color: #555; transform: translateY(-2px); }
        .strip-thumb.active { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(201,169,110,0.2); }

        .thumb-a { background: linear-gradient(135deg, #0a0a0a, #1a1a1a); color: #c9a96e; }
        .thumb-b { background: linear-gradient(135deg, #fafafa, #e8e2d9); color: #2d5a47; }
        .thumb-c { background: linear-gradient(135deg, #f5f0eb, #e8ddd0); color: #6b1d1d; }
        .thumb-d { background: linear-gradient(135deg, #0d1b2a, #1b2838); color: #d4956a; }
        .thumb-e { background: linear-gradient(135deg, #f8f4ef, #ece5da); color: #2c1810; }

        /* Mobile */
        @media (max-width: 768px) {
            .gallery-view { padding: 40px 16px 60px; }
            .concepts-grid { grid-template-columns: 1fr; gap: 16px; }
            .card-swatch { height: 120px; }
            .viewer-topbar { padding: 0 12px; height: 50px; }
            .viewer-title h3 { font-size: 0.85rem; }
            .viewer-title .concept-tag { display: none; }
            .viewer-btn { padding: 6px 10px; font-size: 0.7rem; }
            .viewer-strip { padding: 8px 12px; gap: 6px; }
            .strip-thumb { width: 60px; height: 36px; }
        }

        @media (max-width: 480px) {
            .viewer-btn span.btn-label { display: none; }
        }
    </style>
</head>
<body>

    <!-- GALLERY VIEW -->
    <div class="gallery-view" id="gallery">
        <div class="gallery-header">
            <h1>The Miners 1928</h1>
            <p class="subtitle">Website Design Concepts</p>
            <p class="instructions">Click any concept to view the full design. Use arrow keys or buttons to flip between them.</p>
        </div>

        <div class="concepts-grid" id="conceptsGrid">
            <!-- Cards are generated by JS -->
        </div>
    </div>

    <!-- VIEWER MODE -->
    <div class="viewer" id="viewer">
        <div class="viewer-topbar">
            <div class="viewer-title">
                <h3 id="viewerName">-</h3>
                <span class="concept-tag" id="viewerTag">-</span>
            </div>
            <div class="viewer-controls">
                <button class="viewer-btn" onclick="navigate(-1)" title="Previous (Left Arrow)">
                    <span class="nav-arrow">&larr;</span> <span class="btn-label">Prev</span>
                </button>
                <span class="viewer-counter" id="viewerCounter">1 / 5</span>
                <button class="viewer-btn" onclick="navigate(1)" title="Next (Right Arrow)">
                    <span class="btn-label">Next</span> <span class="nav-arrow">&rarr;</span>
                </button>
                <button class="viewer-btn close-btn" onclick="closeViewer()" title="Back to Gallery (Esc)">
                    <span class="btn-label">Gallery</span> &times;
                </button>
            </div>
        </div>

        <div class="viewer-frame">
            <div class="viewer-loading" id="viewerLoading">
                <div class="spinner"></div>
            </div>
            <iframe id="viewerIframe" title="Design Preview"></iframe>
        </div>

        <div class="viewer-strip" id="viewerStrip">
            <!-- Thumbnails generated by JS -->
        </div>
    </div>

    <script>
        const concepts = [
            {
                id: 'a',
                name: 'Gilded Heritage',
                tag: 'Concept A',
                url: 'designs/concept-a/index.html',
                desc: 'Dark, dramatic luxury. Black backgrounds with rich gold accents. Cinematic scroll animations and film-grain texture. Stepping into a grand hotel lobby at midnight.',
                cardClass: 'card-a',
                thumbClass: 'thumb-a',
                letter: 'A'
            },
            {
                id: 'b',
                name: 'Anthracite Modern',
                tag: 'Concept B',
                url: 'designs/concept-b/index.html',
                desc: 'Clean, airy, editorial. Generous white space with warm stone grays and deep teal accents. Asymmetric layouts where typography does the heavy lifting. Architectural Digest meets boutique hotel.',
                cardClass: 'card-b',
                thumbClass: 'thumb-b',
                letter: 'B'
            },
            {
                id: 'c',
                name: 'Industrial Luxe',
                tag: 'Concept C',
                url: 'designs/concept-c/index.html',
                desc: 'Warm, story-driven, editorial. Cream backgrounds with burgundy and copper. Magazine-style pull quotes and a horizontal scroll gallery. A luxury travel feature about a hidden gem.',
                cardClass: 'card-c',
                thumbClass: 'thumb-c',
                letter: 'C'
            },
            {
                id: 'd',
                name: 'Art Deco Revival',
                tag: 'Concept D',
                url: 'designs/concept-d/index.html',
                desc: 'Deep navy with burnished copper and rose gold. Geometric patterns, chevron dividers, and sunburst motifs. The Great Gatsby meets a boutique hotel - era-authentic for a 1928 building.',
                cardClass: 'card-d',
                thumbClass: 'thumb-d',
                letter: 'D'
            },
            {
                id: 'e',
                name: 'Stone & Light',
                tag: 'Concept E',
                url: 'designs/concept-e/index.html',
                desc: 'Quiet luxury through restraint. Warm travertine whites and deep espresso. Enormous white space, beautiful typography, minimal decoration. The design equivalent of a whisper in a quiet room.',
                cardClass: 'card-e',
                thumbClass: 'thumb-e',
                letter: 'E'
            }
        ];

        let currentIndex = 0;

        // Build gallery cards
        const grid = document.getElementById('conceptsGrid');
        concepts.forEach((c, i) => {
            const card = document.createElement('div');
            card.className = `concept-card ${c.cardClass}`;
            card.onclick = () => openViewer(i);
            card.innerHTML = `
                <div class="card-swatch">
                    <span class="card-label">M | 1928</span>
                </div>
                <div class="card-info">
                    <h2>${c.name}</h2>
                    <span class="tag">${c.tag}</span>
                    <p>${c.desc}</p>
                </div>
            `;
            grid.appendChild(card);
        });

        // Build thumbnail strip
        const strip = document.getElementById('viewerStrip');
        concepts.forEach((c, i) => {
            const thumb = document.createElement('div');
            thumb.className = `strip-thumb ${c.thumbClass}`;
            thumb.setAttribute('data-letter', c.letter);
            thumb.onclick = () => goTo(i);
            thumb.id = `thumb-${i}`;
            strip.appendChild(thumb);
        });

        function openViewer(index) {
            currentIndex = index;
            document.getElementById('gallery').classList.add('hidden');
            document.getElementById('viewer').classList.add('active');
            loadConcept(index);
        }

        function closeViewer() {
            document.getElementById('viewer').classList.remove('active');
            document.getElementById('gallery').classList.remove('hidden');
            document.getElementById('viewerIframe').src = '';
        }

        function navigate(dir) {
            let next = currentIndex + dir;
            if (next < 0) next = concepts.length - 1;
            if (next >= concepts.length) next = 0;
            goTo(next);
        }

        function goTo(index) {
            currentIndex = index;
            loadConcept(index);
        }

        function loadConcept(index) {
            const c = concepts[index];
            const iframe = document.getElementById('viewerIframe');
            const loading = document.getElementById('viewerLoading');

            // Update info
            document.getElementById('viewerName').textContent = c.name;
            document.getElementById('viewerTag').textContent = c.tag;
            document.getElementById('viewerCounter').textContent = `${index + 1} / ${concepts.length}`;

            // Update thumbnails
            document.querySelectorAll('.strip-thumb').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });

            // Load iframe
            loading.classList.remove('loaded');
            iframe.src = c.url;
            iframe.onload = () => {
                loading.classList.add('loaded');
            };
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('viewer').classList.contains('active')) return;

            if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
            if (e.key === 'ArrowRight') { e.preventDefault(); navigate(1); }
            if (e.key === 'Escape') { e.preventDefault(); closeViewer(); }
        });

        // Swipe support for mobile
        let touchStartX = 0;
        const viewerEl = document.getElementById('viewer');
        viewerEl.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
        viewerEl.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 60) {
                navigate(diff > 0 ? -1 : 1);
            }
        }, { passive: true });
    </script>
</body>
</html>
